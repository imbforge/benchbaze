{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <meta name="description" content="" />
    <meta name="keywords" content="" />

    <title>BenchBaze @ {{lab_name}}</title>

    <link
      rel="icon"
      type="image/png"
      href="{% static 'authentication/favicon.ico' %}"
    />
    <link
      rel="stylesheet"
      href="{% static 'authentication/style.css' %}"
    />

    {% block css %}{% endblock %} {% block extrahead %}{% endblock %}
  </head>

  <body class="bb-auth-page">
    <div class="bb-auth-shell">
      <aside class="bb-auth-brand-panel">
        <div class="bb-auth-branding">
          <div class="bb-auth-logo-wrap">
            <img
              src="{% static 'authentication/logo.svg' %}"
              class="bb-authentication-box-logo"
              alt="BenchBaze logo"
            />
          </div>
          <h1 class="bb-authentication-box-title">
            <span class="bb-authentication-box-coloured-title">B</span>ENCH<span
              class="bb-authentication-box-coloured-title"
              >B</span
            >AZE
          </h1>
          <h2 class="bb-authentication-box-lab-name">
            <span class="bb-authentication-box-coloured-title">@</span>
            {{lab_name}}
          </h2>
        </div>
      </aside>

      <main id="authentication-box" class="bb-authentication-box">
        {% block content %}{% endblock %}
      </main>
    </div>

    <footer class="footer">
      {% if impressum_url %}<a href="{{impressum_url}}" target="_blank"
        >Impressum</a
      >{% endif %} {% if data_protection_url %}<a
        href="{{data_protection_url}}"
        target="_blank"
        >Datenschutz</a
      >{% endif %}
    </footer>

    {% block js %}{% endblock %}
  </body>
</html>
