<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite React App</title>
    <link rel="stylesheet" href="/initial-loader.css" />
  </head>
  <body>
    <script>
      (function () {
        try {
          var storedTheme = window.localStorage.getItem("theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark =
            storedTheme === "dark" ||
            (storedTheme !== "light" && storedTheme !== "dark" && prefersDark);

          document.documentElement.setAttribute(
            "data-initial-theme",
            isDark ? "dark" : "light",
          );
        } catch (error) {
          document.documentElement.setAttribute("data-initial-theme", "light");
        }
      })();
    </script>
    <div id="root">
      <div class="tg-loader-container">
        <div class="loading-spinner" aria-label="Loading map viewer" role="status">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
